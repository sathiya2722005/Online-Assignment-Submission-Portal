<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Login | Online Assignment Submission Portal</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: linear-gradient(to right, #3f51b5, #1a237e);
            background-image: url(../static/img/log.jpg);
            background-position: center;
            background-size: cover;
        }

        .navbar {
            background-color: #0d1440;
            padding: 15px 30px;
        }

        .navbar a {
            color: white;
            text-decoration: none;
            font-size: 18px;
        }

        .login-container {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 90vh;
        }

        .login-box {
            background-color: white;
            width: 360px;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0px 5px 15px rgba(0,0,0,0.3);
        }

        .login-box h2 {
            text-align: center;
            color: #1a237e;
            margin-bottom: 20px;
        }

        .login-box label {
            font-weight: bold;
            display: block;
            margin-top: 12px;
        }

        .required {
            color: red;
            margin-left: 4px;
        }

        .login-box input {
            width: 100%;
            padding: 10px;
            margin-top: 6px;
            border: 1px solid #ccc;
            border-radius: 5px;
        }

        .login-box button {
            width: 100%;
            padding: 12px;
            margin-top: 22px;
            background-color: #1a237e;
            color: white;
            border: none;
            font-size: 16px;
            border-radius: 5px;
            cursor: pointer;
        }

        .login-box button:hover {
            background-color: #3949ab;
        }

        .login-box p {
            text-align: center;
            margin-top: 15px;
        }

        .login-box a {
            text-decoration: none;
            color: #1a237e;
            font-weight: bold;
        }

        .hint {
            font-size: 12px;
            color: #555;
            margin-top: 4px;
        }

        .error-msg {
            color: red;
            text-align: center;
            margin-top: 10px;
        }
    </style>
</head>

<body>

<div class="navbar">
    <a href="{{ url_for('home') }}">← Back to Home</a>
</div>

<div class="login-container">
    <div class="login-box">
        <h2>Student Login</h2>

       <!-- ✅ Form submits to Flask -->
     <form method="POST" action="{{ url_for('login') }}">



            <label>Full Name<span class="required">*</span></label>
           <input type="text" name="full_name" placeholder="Enter your full name" required>



            <label>Password<span class="required">*</span></label>
            <input type="password" name="password" placeholder="Enter Strong Password" required>

            <div class="hint">
                Must contain uppercase, lowercase, number & special character
            </div>

            <button type="submit">LOGIN</button>

            <!-- ✅ Show error if login fails -->
            {% if error %}
            <div class="error-msg">{{ error }}</div>
            {% endif %}

        </form>

        <p>New Student? <a href="{{ url_for('register') }}">Register Here</a></p>
    </div>
</div>

</body>
</html>
