<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Staff Login | Assignment Submission Portal</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
}

body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
    background-image: url("{{ url_for('static', filename='img/staff3.jpg') }}");
    background-position: center;
    background-size: cover;
}

/* ===== BACK TO HOME ===== */
.back-home{
    position:absolute;
    top:20px;
    left:20px;
}

.back-home a{
    text-decoration:none;
    color:#fff;
    background:#203a43;
    padding:8px 14px;
    border-radius:6px;
    font-weight:bold;
}

.back-home a:hover{
    background:#162b32;
}

/* LOGIN BOX */
.login-box{
    width:380px;
    background:#fff;
    padding:30px;
    border-radius:12px;
    box-shadow:0 10px 25px rgba(0,0,0,0.25);
}

.login-box h2{
    text-align:center;
    margin-bottom:25px;
    color:#203a43;
    font-size:24px;
    font-weight:700;
}

/* LABEL + STAR */
.label-row{
    display:flex;
    align-items:center;
    margin-top:15px;
    font-weight:bold;
    color:#333;
}

.required{
    color:red;
    margin-left:5px;
    font-size:16px;
}

/* INPUT */
input{
    width:100%;
    padding:10px;
    margin-top:6px;
    border-radius:6px;
    border:1px solid #ccc;
    font-size:14px;
}

input:focus{
    outline:none;
    border-color:#203a43;
}

/* ERROR */
.error{
    color:red;
    font-size:13px;
    margin-top:5px;
}

/* LOGIN BUTTON */
button{
    width:100%;
    margin-top:25px;
    padding:12px;
    background:#203a43;
    color:#fff;
    border:none;
    border-radius:6px;
    font-size:16px;
    font-weight:bold;
    cursor:pointer;
}

button:hover{
    background:#162b32;
}

/* REGISTER LINK */
.register-text{
    text-align:center;
    margin-top:18px;
    font-size:14px;
}

.register-text a{
    color:#203a43;
    font-weight:bold;
    text-decoration:none;
}

.register-text a:hover{
    text-decoration:underline;
}
</style>
</head>

<body>

<!-- BACK TO HOME -->
<div class="back-home">
    <a href="{{ url_for('home') }}">⬅ Back to Home</a>
</div>

<div class="login-box">
<h2>Staff Login</h2>

<!-- 🔥 IMPORTANT: action MUST be staff_login -->
<form method="POST" action="{{ url_for('staff_login') }}" onsubmit="return validateLogin()">

    <!-- Email -->
    <div class="label-row">
        <label>Email</label>
        <span class="required">*</span>
    </div>
    <input type="email" name="email" id="email" placeholder="Enter your email">
    <div class="error" id="emailError"></div>

    <!-- Password -->
    <div class="label-row">
        <label>Password</label>
        <span class="required">*</span>
    </div>
    <input type="password" name="password" id="password" placeholder="Enter your password">
    <div class="error" id="passError"></div>

    <!-- Flask error message -->
    {% if error %}
        <div class="error" style="margin-top:10px;">{{ error }}</div>
    {% endif %}

    <button type="submit">LOGIN</button>

</form>

<!-- REGISTER -->
<div class="register-text">
    If not registered?
    <a href="{{ url_for('staff_register') }}">Go to Register</a>
</div>

</div>

<script>
function validateLogin(){
    let email = document.getElementById("email").value.trim();
    let password = document.getElementById("password").value.trim();

    document.getElementById("emailError").innerText = "";
    document.getElementById("passError").innerText = "";

    let valid = true;

    if(email === ""){
        document.getElementById("emailError").innerText = "Email is required";
        valid = false;
    }

    if(password === ""){
        document.getElementById("passError").innerText = "Password is required";
        valid = false;
    }

    return valid;
}
</script>

</body>
</html>
