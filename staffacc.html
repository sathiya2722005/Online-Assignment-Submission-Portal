<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Staff Account</title>

<style>

body{
margin:0;
font-family:Arial;
background:linear-gradient(to right,#4f46e5,#9333ea);
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.card{
background:white;
padding:30px;
width:400px;
border-radius:12px;
box-shadow:0 10px 25px rgba(0,0,0,0.3);
}

h2{
text-align:center;
margin-bottom:20px;
}

.avatar{
width:60px;
height:60px;
border-radius:50%;
background:#4f46e5;
color:white;
display:flex;
align-items:center;
justify-content:center;
font-size:25px;
font-weight:bold;
margin:auto;
margin-bottom:20px;
}

label{
font-weight:bold;
display:block;
margin-top:12px;
}

input{
width:100%;
padding:8px;
margin-top:5px;
border-radius:6px;
border:1px solid #ccc;
}

button{
width:100%;
margin-top:20px;
padding:10px;
background:#4f46e5;
color:white;
border:none;
border-radius:6px;
cursor:pointer;
font-size:15px;
}

button:hover{
background:#3730a3;
}

.back-btn{
background:#6b7280;
margin-top:10px;
}

</style>
</head>

<body>

<div class="card">

<h2>My Account</h2>

<div class="avatar">
{{ session['staff_name'][0] }}
</div>

<form action="{{ url_for('update_staff_profile') }}" method="POST">

<label>Staff ID</label>
<input type="text" name="staff_id" value="{{ staff.staff_id }}" required>

<label>Staff Name</label>
<input type="text" name="staff_name" value="{{ staff.staff_name }}" required>

<label>Email</label>
<input type="email" name="email" value="{{ staff.email }}" required>

<label>Department</label>
<input type="text" name="department" value="{{ staff.department }}" required>

<button type="submit">Save Changes</button>

</form>

<a href="{{ url_for('staff_dashboard') }}">
<button class="back-btn">← Back to Dashboard</button>
</a>

</div>

</body>
</html>
